<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalhes da IA - Synapse</title>
    <link rel="stylesheet" href="css/global.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo-container">
        <img src="assets/img/Logo Synapse.png" alt="logo synapse" />
        <h1>Synapse</h1>
      </div>
      
      <input type="checkbox" id="menu-toggle" class="menu-toggle">
      <label for="menu-toggle" class="hamburger">
        <i class="fas fa-bars"></i>
      </label>

      <ul class="nav-links">
        <li><a href="index.html">Início</a></li>
        <li><a href="buscar.html">Buscar IAs</a></li>
        <li><a href="consultoria.html">Consultoria</a></li>
      </ul>
      <a href="perfil.html" class="profile-icon"><i class="fas fa-user"></i></a>
    </nav>

    <main class="container" id="tool-details">
      <div class="tool-header">
        <div class="tool-header-info">
          <img id="tool-logo" src="" alt="Logo" class="tool-logo" />
          <div>
            <h1 id="tool-name">Carregando...</h1>
            <p id="tool-desc" class="tool-desc"></p>
          </div>
        </div>
        <div class="tool-header-actions">
          <button id="fav-btn" class="btn-outline">
            <i class="fas fa-heart"></i>
          </button>
          <a href="#" id="tool-link" target="_blank" class="btn-primary">Acessar Ferramenta ↗</a>
        </div>
      </div>

      <div class="details-grid">
        <div class="card-detail">
          <h3 class="detail-section-title">Principais Benefícios</h3>
          <ul id="tool-benefits" class="benefits-list"></ul>

          <h3 class="detail-section-title">Recursos Técnicos</h3>
          <div id="tool-resources" class="resources-grid"></div>
        </div>

        <div>
          <div class="card-detail card-sidebar-item-center">
            <h3 class="sidebar-label">Modelo de Preço</h3>
            <h2 id="tool-price" class="price-value"></h2>
          </div>

          <div class="card-detail card-sidebar-item">
            <h3 class="sidebar-label">Categoria</h3>
            <p id="tool-category" class="category-badge"></p>
          </div>

          <div class="card-detail">
            <h3 class="sidebar-label">Nível de Capacidade</h3>
            <p id="tool-level" class="level-badge"></p>
          </div>
        </div>
      </div>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil - Synapse</title>
    <link rel="stylesheet" href="css/global.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo-container">
        <img src="assets/img/Logo Synapse.png" alt="logo synapse" />
        <h1>Synapse</h1>
      </div>

      <input type="checkbox" id="menu-toggle" class="menu-toggle" />
      <label for="menu-toggle" class="hamburger">
        <i class="fas fa-bars"></i>
      </label>

      <ul class="nav-links">
        <li><a href="index.html">Início</a></li>
        <li><a href="buscar.html">Buscar IAs</a></li>
        <li><a href="consultoria.html">Consultoria</a></li>
      </ul>
      <a href="perfil.html" class="profile-icon"
        ><i class="fa-regular fa-user"></i
      ></a>
    </nav>

    <main class="container">
      <div class="profile-header">
        <div class="profile-meta">
          <h2 id="user-name">Carregando...</h2>
          <p id="user-email"></p>
          <div class="profile-info">
            <div class="info-box">
              <strong>Empresa:</strong> <span id="user-company"></span>
            </div>
            <div class="info-box">
              <strong>Cargo:</strong> <span id="user-role"></span>
            </div>
            <div class="info-box">
              <strong>Telefone:</strong> <span id="user-phone"></span>
            </div>
          </div>
        </div>
        <button class="btn-logout">Sair</button>
      </div>

      <div class="history-grid">
        <div class="card-detail">
          <h2 class="card-title-icon">
            <i class="fa-solid fa-heart icon-purple"></i> Favoritos
          </h2>
          <div id="favorites-list"></div>
        </div>
        <div class="card-detail">
          <h2 class="card-title-icon">
            <i class="fa-solid fa-clock icon-purple"></i> Histórico de Cliques
          </h2>
          <div id="history-list"></div>
        </div>
      </div>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
